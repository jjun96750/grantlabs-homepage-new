name: Static site check

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: static-site-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Regenerate content automation outputs
        run: npm run content:run:all

      - name: Verify content automation outputs are committed
        run: git diff --exit-code -- content-automation

      - name: Regenerate deployment readiness report
        run: npm run deployment:readiness

      - name: Verify deployment readiness report is committed
        run: git diff --exit-code -- DEPLOYMENT_READINESS.md

      - name: Regenerate status index
        run: npm run status:index

      - name: Verify status index is committed
        run: git diff --exit-code -- STATUS_INDEX.md

      - name: Run content automation validation
        run: npm run check:content

      - name: Run static validation
        run: npm run check

      - name: Run local preview validation
        shell: bash
        run: |
          npm run serve > /tmp/grantlabs-preview.log 2>&1 &
          preview_pid=$!
          trap 'kill "$preview_pid" 2>/dev/null || true' EXIT

          for attempt in {1..20}; do
            if curl -fsS http://127.0.0.1:4173/ > /dev/null; then
              break
            fi
            sleep 1
          done

          npm run preview:check -- http://127.0.0.1:4173
